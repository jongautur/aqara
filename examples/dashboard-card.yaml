# Unified "Front Door" dashboard card: live camera + lock + open button.
#
# Built entirely from Home Assistant's BUILT-IN cards — no extra HACS frontend
# card required. Paste via: Edit Dashboard -> Add Card -> Manual.
#
# Entity IDs below are the REAL ones for this install (front door = Útidyrahurð):
#   camera.aqara_doorbell_main                        <- Aqara Local integration
#   lock.aqara_smart_lock_u200_lite_2                 <- Útidyrahurð (front door)
#   sensor.aqara_smart_lock_u200_lite_battery_2       <- front door battery
#   number.aqara_smart_lock_u200_lite_auto_relock_time<- 30s auto-relock (firmware)
#
# NOTE: the front-door lock supports lock.open (OPEN feature = unlatch & open).
# The shed lock (Skúr, lock.aqara_smart_lock_u200_lite) does NOT — it only
# locks/unlocks the deadbolt.

type: vertical-stack
title: Útidyrahurð
cards:
  # --- Live camera (tap to expand) ---
  - type: picture-glance
    title: Doorbell
    camera_image: camera.aqara_doorbell_main
    camera_view: live
    entities:
      - entity: lock.aqara_smart_lock_u200_lite_2
        tap_action:
          action: more-info
    tap_action:
      action: more-info

  # --- Action buttons: Open (unlatch) / Unlock (bolt) / Lock ---
  - type: horizontal-stack
    cards:
      - type: button
        name: Open
        icon: mdi:door-open
        icon_height: 36px
        entity: lock.aqara_smart_lock_u200_lite_2
        show_state: true
        tap_action:
          action: call-service
          service: lock.open          # unlatches & opens the door
          target:
            entity_id: lock.aqara_smart_lock_u200_lite_2
          confirmation:
            text: Open (unlatch) the front door?

      - type: button
        name: Unlock
        icon: mdi:lock-open-variant
        icon_height: 36px
        entity: lock.aqara_smart_lock_u200_lite_2
        show_state: false
        tap_action:
          action: call-service
          service: lock.unlock        # retracts the deadbolt only
          target:
            entity_id: lock.aqara_smart_lock_u200_lite_2
          confirmation:
            text: Unlock the front door?

      - type: button
        name: Lock
        icon: mdi:lock
        icon_height: 36px
        entity: lock.aqara_smart_lock_u200_lite_2
        show_state: false
        tap_action:
          action: call-service
          service: lock.lock
          target:
            entity_id: lock.aqara_smart_lock_u200_lite_2

  # --- Status row: battery + auto-relock ---
  - type: entities
    entities:
      - entity: lock.aqara_smart_lock_u200_lite_2
        name: Lock status
      - entity: sensor.aqara_smart_lock_u200_lite_battery_2
        name: Battery
      - entity: number.aqara_smart_lock_u200_lite_auto_relock_time
        name: Auto-relock (s)

# ---------------------------------------------------------------------------
# LOW-LATENCY ALTERNATIVE (recommended for a doorbell)
# ---------------------------------------------------------------------------
# picture-glance "live" uses HLS (~2-5s delay). For near-real-time video,
# install the "WebRTC Camera" frontend card from HACS and replace the
# picture-glance card above with:
#
#   - type: custom:webrtc-camera
#     entity: camera.aqara_doorbell_main
#     # or stream straight from go2rtc by name:
#     # url: g410_doorbell
#
# Everything else (buttons, status) stays the same.
